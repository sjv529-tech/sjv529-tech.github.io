    <style>
        /* ADDITIONAL STYLES FOR LABELS & ENHANCED HOVER EFFECTS */
        /* this works alongside your existing homepage.css */

        .pin-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform, filter;
        }

        .pin-image {
            width: 100%;
            height: auto;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        /* ========== CUTE LABEL STYLES ========== */
        .pin-label {
            display: inline-block;
            margin-top: 12px;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Comic Neue', 'Kalam', cursive, sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            background: rgba(255, 248, 225, 0.9);
            backdrop-filter: blur(2px);
            padding: 6px 14px;
            border-radius: 60px;
            color: #5e3a2b;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 245, 0.8);
            transition: all 0.25s ease;
            border: 1px solid rgba(230, 190, 140, 0.6);
            text-shadow: 0 1px 0 rgba(255, 255, 200, 0.6);
            cursor: pointer;
            white-space: nowrap;
        }

        /* tiny decorative doodle before label (optional cuteness) */
        .pin-label::before {
            content: "✧ ";
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .pin-label::after {
            content: " ✧";
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* HOVER EFFECT: colour filter covers both label + icon, plus extra tilt (+5deg more than original) */
        .pin-item:hover {
            transform: scale(1.05); /* base scaling kept from original but we'll preserve tilt change */
            filter: drop-shadow(0 12px 15px rgba(0, 0, 0, 0.25));
            z-index: 200;
        }

        /* apply colour overlay filter to image + label as a group */
        .pin-item:hover .pin-image {
            filter: brightness(1.02) saturate(1.2) drop-shadow(0 4px 6px rgba(0,0,0,0.2));
            transition: filter 0.2s ease;
        }

        /* small adjustment for labels to not overflow on narrow screens (optional) */
        @media (max-width: 768px) {
            .pin-label {
                font-size: 0.8rem;
                padding: 4px 12px;
                white-space: normal;
                text-align: center;
            }
            .pin-label::before, .pin-label::after {
                content: " ✦ ";
            }
        }

        /* ensure that the colour overlay works well with existing tape/pin decorations */
        .tack, .tape {
            z-index: 25;
        }
    </style>
</head>
