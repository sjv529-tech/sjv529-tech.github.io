<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="homepage.css" />
    <title>୨୧ ⋆｡˚ ⋆ ella's web ୨୧ ⋆｡˚ ⋆</title>
</head>
<body>
    <div class="main-board">

        <!-- ABOUT ME link -->
        <a href="about.html" class="pin-item" id="about-link">
            <span class="pin-image-wrapper">
                <img src="img/me.png" class="pin-image" id="aboutImg" alt="about me" onerror="this.src='https://placehold.co/200x200/ff69b4/white?text=ABOUT'">
            </span>
            <span class="pin-label">about me</span>
        </a>

        <a href="devlog.html" class="pin-item" id="devlog-link">
            <span class="pin-image-wrapper">
                <img src="img/devlog.png" class="pin-image" alt="dev diary" onerror="this.src='https://placehold.co/228x200/lightblue/white?text=DEVLOG'">
            </span>
            <span class="pin-label">dev diary</span>
        </a>

        <a href="projects.html" class="pin-item" id="projects-link">
            <span class="pin-image-wrapper">
                <img src="img/misoguy.png" class="pin-image" alt="projects" onerror="this.src='https://placehold.co/245x200/lightgreen/white?text=PROJECTS'">
            </span>
            <span class="pin-label">projects</span>
        </a>

        <a href="shrines.html" class="pin-item" id="shrines-link">
            <span class="pin-image-wrapper">
                <img src="img/tigr.png" class="pin-image" alt="shrines" onerror="this.src='https://placehold.co/244x200/lightyellow/white?text=SHRINES'">
            </span>
            <span class="pin-label">shrines</span>
        </a>

        <a href="message.html" class="pin-item" id="message-link">
            <span class="pin-image-wrapper">
                <img src="img/greenman.png" class="pin-image" alt="message me" onerror="this.src='https://placehold.co/226x200/lightcoral/white?text=MESSAGE'">
            </span>
            <span class="pin-label">message me</span>
        </a>

        <a href="resources.html" class="pin-item" id="resources-link">
            <span class="pin-image-wrapper">
                <img src="img/cookie_face.png" class="pin-image" alt="resources" onerror="this.src='https://placehold.co/155x200/lightpurple/white?text=RESOURCES'">
            </span>
            <span class="pin-label">resources</span>
        </a>

        <a href="interests.html" class="pin-item" id="interests-link">
            <span class="pin-image-wrapper">
                <img src="img/teddy.png" class="pin-image" alt="interests" onerror="this.src='https://placehold.co/188x200/lightsalmon/white?text=INTERESTS'">
            </span>
            <span class="pin-label">interests</span>
        </a>

        <a href="photos.html" class="pin-item" id="photos-link">
            <span class="pin-image-wrapper">
                <img src="YOUR-PHOTOS-IMAGE.png" class="pin-image" alt="photos" onerror="this.src='https://placehold.co/150x200/lightgray/white?text=PHOTOS'">
            </span>
            <span class="pin-label">photos</span>
        </a>

        <a href="contact.html" class="pin-item" id="contact-link">
            <span class="pin-image-wrapper">
                <img src="YOUR-CONTACT-IMAGE.png" class="pin-image" alt="contact" onerror="this.src='https://placehold.co/120x200/lightgray/white?text=CONTACT'">
            </span>
            <span class="pin-label">contact</span>
        </a>

    </div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var aboutImage = document.getElementById('aboutImg');
        var originalSrc = 'img/me.png'; // hardcode this instead of reading .src

        var imageMap = {
            'about-link': 'img/me.png',
            'devlog-link': 'img/devlog.png',
            'projects-link': 'img/misoguy.png',
            'shrines-link': 'img/tigr.png',
            'message-link': 'img/greenman.png',
            'resources-link': 'img/cookie_face.png',
            'interests-link': 'img/teddy.png',
            'photos-link': 'YOUR-PHOTOS-IMAGE.png',
            'contact-link': 'YOUR-CONTACT-IMAGE.png'
        };

        var links = document.getElementsByClassName('pin-item');

        for (var i = 0; i < links.length; i++) {
            var link = links[i];
            var newImage = imageMap[link.id];

            link.onmouseenter = (function(img) {
                return function() {
                    if (img) aboutImage.src = img;
                };
            })(newImage);

            link.onmouseleave = function() {
                aboutImage.src = originalSrc;
            };
        }
    });
</script>
</body>
</html>
